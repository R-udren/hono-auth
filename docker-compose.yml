services:
  hono-auth:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Auth configuration
      - BETTER_AUTH_TELEMETRY=0

      # Database
      # Connect to the postgres service defined below
      - DATABASE_URL=${AUTH_DATABASE_URL:-postgresql://postgres:postgres@hono-auth-postgres:5432/better_auth}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}

      # Avatar storage
      - AVATAR_S3_ACCESS_KEY_ID=${AVATAR_S3_ACCESS_KEY_ID:-rustfsavatars}
      - AVATAR_S3_SECRET_ACCESS_KEY=${AVATAR_S3_SECRET_ACCESS_KEY:-rustfsavatarssecret}
      - AVATAR_S3_BUCKET=${AVATAR_S3_BUCKET:-avatars}
      - AVATAR_S3_ENDPOINT=${AUTH_AVATAR_S3_ENDPOINT:-http://hono-auth-rustfs:9000}
      - AVATAR_S3_REGION=${AVATAR_S3_REGION:-us-east-1}
      - AVATAR_PUBLIC_BASE_URL=${AVATAR_PUBLIC_BASE_URL:-http://localhost:3910/avatars/}
      - AVATAR_S3_FORCE_PATH_STYLE=${AVATAR_S3_FORCE_PATH_STYLE:-true}
    depends_on:
      hono-auth-postgres:
        condition: service_healthy
      hono-auth-rustfs-init:
        condition: service_completed_successfully
    restart: unless-stopped

  hono-auth-rustfs-permissions:
    image: alpine:3.21
    command: [sh, -c, "chown -R 10001:10001 /data /logs"]
    volumes:
      - hono_auth_rustfs_data:/data
      - hono_auth_rustfs_logs:/logs
    restart: no

  hono-auth-rustfs:
    image: rustfs/rustfs:latest
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_ACCESS_KEY=${AVATAR_S3_ACCESS_KEY_ID:-rustfsavatars}
      - RUSTFS_SECRET_KEY=${AVATAR_S3_SECRET_ACCESS_KEY:-rustfsavatarssecret}
      - RUSTFS_REGION=${AVATAR_S3_REGION:-us-east-1}
    depends_on:
      hono-auth-rustfs-permissions:
        condition: service_completed_successfully
    ports:
      - 127.0.0.1:3910:9000
      - 127.0.0.1:3911:9001
    volumes:
      - hono_auth_rustfs_data:/data
      - hono_auth_rustfs_logs:/logs
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://127.0.0.1:9000/health && curl -fsS http://127.0.0.1:9001/rustfs/console/health"

      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  hono-auth-rustfs-init:
    image: minio/mc:latest
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        until mc alias set local http://hono-auth-rustfs:9000 "$$AVATAR_S3_ACCESS_KEY_ID" "$$AVATAR_S3_SECRET_ACCESS_KEY"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$AVATAR_S3_BUCKET"
        mc anonymous set download "local/$$AVATAR_S3_BUCKET"
    environment:
      - AVATAR_S3_ACCESS_KEY_ID=${AVATAR_S3_ACCESS_KEY_ID:-rustfsavatars}
      - AVATAR_S3_SECRET_ACCESS_KEY=${AVATAR_S3_SECRET_ACCESS_KEY:-rustfsavatarssecret}
      - AVATAR_S3_BUCKET=${AVATAR_S3_BUCKET:-avatars}
    depends_on:
      hono-auth-rustfs:
        condition: service_healthy
    restart: no

  hono-auth-postgres:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=better_auth
    # ports:
    #   - "5432:5432"
    volumes:
      - hono_auth_postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: [CMD-SHELL, pg_isready -U postgres]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hono_auth_postgres_data:
  hono_auth_rustfs_data:
  hono_auth_rustfs_logs:
